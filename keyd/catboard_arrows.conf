# catboard arrows
# Generated from karabiner JSON: catboard_arrows.json
# Usage: copy under /etc/keyd/<name>.conf, then `keyd reload`

[ids]
*

[main]
leftmeta = layer(left-command)

[left-command]
j = left
k = down
i = up
l = right
u = M-left
o = M-right
p = pageup
semicolon = pagedown
h = enter
y = esc
m = backspace
comma = delete
