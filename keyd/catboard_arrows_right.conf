# catboard arrows right command
# Generated from karabiner JSON: catboard_arrows_right.json
# Usage: copy under /etc/keyd/<name>.conf, then `keyd reload`

[ids]
*

[main]
rightmeta = layer(right-command)

[right-command]
j = left
k = down
i = up
l = right
u = M-left
o = M-right
p = pageup
semicolon = pagedown
h = enter
y = esc
m = backspace
comma = delete
